<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remember the promise.</title>
<link href="" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0c1019; overflow: hidden; cursor: crosshair; }
  #bg { position: fixed; inset: 0; z-index: 0; }

  .corner {
    position: fixed; width: 16px; height: 16px; border-style: solid;
    z-index: 50; pointer-events: none; opacity: 0.28;
  }
  .corner-tl { top: 14px; left: 14px;   border-color: rgba(200,220,255,0.55); border-width: 1px 0 0 1px; }
  .corner-tr { top: 14px; right: 14px;  border-color: rgba(200,220,255,0.55); border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 14px; left: 14px;  border-color: rgba(200,220,255,0.55); border-width: 0 0 1px 1px; }
  .corner-br { bottom: 14px; right: 14px; border-color: rgba(200,220,255,0.55); border-width: 0 1px 1px 0; }

  /* 月 */
  #moon {
    position: fixed; top: 16%; left: 50%; transform: translateX(-50%);
    width: 24px; height: 24px; border-radius: 50%; z-index: 10; cursor: default;
    background: radial-gradient(circle at 44% 42%,
      rgba(255,255,255,0.96) 0%, rgba(235,242,255,0.78) 58%, rgba(190,210,255,0.34) 100%);
    box-shadow: 0 0 10px 4px rgba(200,220,255,0.22), 0 0 32px 12px rgba(180,210,255,0.10), 0 0 70px 30px rgba(160,200,255,0.04);
    opacity: 0.88;
    animation: moonpulse 7s ease-in-out infinite;
  }
  @keyframes moonpulse {
    0%,100% { transform: translateX(-50%) scale(1); }
    50%      { transform: translateX(-50%) scale(1.05); }
  }

  /* パスワード入力 */
  .lock-form {
    position: fixed; top: 34%; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    z-index: 10; opacity: 0; animation: fadein 2s ease 0.6s forwards;
  }
  .lock-input {
    background: transparent; border: none;
    border-bottom: 1px solid rgba(200,220,255,0.22);
    color: rgba(220,232,255,0.72); font-family: 'Cormorant Garamond', serif;
    font-size: 16px; letter-spacing: 0.35em;
    padding: 6px 4px; width: 200px; text-align: center; outline: none;
    transition: border-color 0.4s; text-shadow: 0 0 10px rgba(160,200,255,0.30);
  }
  .lock-input:focus { border-color: rgba(200,220,255,0.42); }
  .lock-input::placeholder { color: rgba(200,220,255,0.14); font-style: italic; font-size: 13px; letter-spacing: 0.18em; }
  .lock-error {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 11px; color: rgba(220,140,140,0.55); letter-spacing: 0.15em; min-height: 16px;
  }
  .lock-hint {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 10px; color: rgba(200,220,255,0.16); letter-spacing: 0.22em;
  }

  /* ローディング */
  #loading-overlay {
    position: fixed; inset: 0; z-index: 55;
    background: rgba(4,6,12,0); pointer-events: none; transition: background 0.8s ease;
  }
  #loading-overlay.active { background: rgba(4,6,12,0.97); pointer-events: auto; }
  #bubble-canvas {
    position: fixed; inset: 0; z-index: 56; pointer-events: none;
    opacity: 0; transition: opacity 0.4s ease;
  }
  #bubble-canvas.active { opacity: 1;
  }
 #white-flash{
  position:fixed;
  inset:0;
  z-index:57;

  background:
    radial-gradient(
      circle at 50% 20%,
      rgba(255,255,255,0.95) 0%,
      rgba(220,235,255,0.55) 25%,
      rgba(180,210,255,0.12) 55%,
      transparent 80%
    );

  opacity:0;
  pointer-events:none;

  transition:
    opacity 1.8s ease,
    transform 2.4s ease,
    filter 2.4s ease;

  transform:scale(0.9);
  filter:blur(40px);
}

#white-flash.active{
  opacity:1;
  transform:scale(1.8);
  filter:blur(80px);
}

  @keyframes fadein { to { opacity: 1; } }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div id="moon"></div>

<div class="lock-form">
  <input class="lock-input" type="password" id="pw-input" placeholder="password" autocomplete="off" />
  <div class="lock-error" id="pw-error"></div>
  <div class="lock-hint">— press enter —</div>
</div>

<div id="loading-overlay"></div>
<div id="white-flash"></div>
<canvas id="bubble-canvas"></canvas>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

const SNOW = Array.from({length: 45}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random()*1.5+0.3, speed: Math.random()*0.00009+0.00003,
  alpha: Math.random()*0.26+0.05,
  wobble: Math.random()*Math.PI*2, wobbleSpeed: Math.random()*0.0007+0.0002,
}));

const WP = 90;
function wave(t, yb, amp, spd, col) {
  ctx.beginPath();
  for (let i=0;i<=WP;i++) {
    const x=(i/WP)*W;
    const y=yb+Math.sin(i*0.16+t*spd)*amp+Math.sin(i*0.08+t*spd*0.65+1.3)*amp*0.44+Math.sin(i*0.30+t*spd*1.2+2.5)*amp*0.20;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.strokeStyle=col; ctx.lineWidth=0.9; ctx.stroke();
}

function draw(t) {
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#1c2436'); bg.addColorStop(0.38,'#141c2c');
  bg.addColorStop(0.70,'#0e1622'); bg.addColorStop(1,'#070b12');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const ml=ctx.createRadialGradient(W*0.5,H*0.10,0,W*0.5,H*0.32,W*0.52);
  ml.addColorStop(0,'rgba(200,218,255,0.10)'); ml.addColorStop(0.6,'rgba(180,205,255,0.04)'); ml.addColorStop(1,'transparent');
  ctx.fillStyle=ml; ctx.fillRect(0,0,W,H);

  const sy=H*0.62;
  wave(t,sy,3.0,0.00038,'rgba(190,215,255,0.20)');
  wave(t,sy+4,2.2,0.00052,'rgba(190,215,255,0.11)');
  wave(t,sy-2.5,1.8,0.00028,'rgba(210,228,255,0.09)');

  ctx.beginPath();
  for (let i=0;i<=WP;i++) {
    const x=(i/WP)*W;
    const y=sy+Math.sin(i*0.16+t*0.00038)*3.0+Math.sin(i*0.08+t*0.00025+1.3)*1.35;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
  const sf=ctx.createLinearGradient(0,sy,0,H);
  sf.addColorStop(0,'rgba(6,12,22,0.50)'); sf.addColorStop(1,'rgba(3,6,12,0.82)');
  ctx.fillStyle=sf; ctx.fill();

  for (const p of SNOW) {
    p.y-=p.speed; p.wobble+=p.wobbleSpeed;
    if(p.y<-0.02){p.y=1.02;p.x=Math.random();}
    const px=(p.x+Math.sin(p.wobble)*0.014)*W, py=p.y*H;
    ctx.beginPath(); ctx.arc(px,py,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,220,255,${p.alpha*(0.25+p.y*0.75)})`; ctx.fill();
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// パスワード認証
const READ_PASSWORD  = 'ytdrm'; // 閲覧用
const WRITE_PASSWORD = '2243'; // 投稿用

function startBubbles(bc) {

  const bctx = bc.getContext('2d');

  bc.width = window.innerWidth;
  bc.height = window.innerHeight;

  const BW = bc.width;
  const BH = bc.height;

  const bubbles = Array.from({ length: 120 }, (_, i) => {

    const b = {
      x: Math.random() * BW,
      y: BH + Math.random() * 80 + 20,

      r: Math.random() * 14 + 2,
      speed: Math.random() * 6 + 2.5,
      alpha: Math.random() * 0.35 + 0.12,

      wobble: Math.random() * Math.PI * 2,
      wobbleAmp: Math.random() * 8 + 1,

      delay: i * 20,

      born: false,
      startTime: null,
    };

    // たまに巨大泡
    if (Math.random() < 0.08) {
      b.r *= 2.4;
      b.speed *= 0.7;
      b.alpha *= 1.4;
    }

    return b;
  });

  let st = null;
  let running = true;

  function anim(ts) {

    if (!running) return;

    if (!st) st = ts;

    const el = ts - st;

    bctx.clearRect(0, 0, BW, BH);

    for (const b of bubbles) {

      if (!b.born && el < b.delay) continue;

      if (!b.born) {
        b.born = true;
        b.startTime = ts;
      }

      b.y -= b.speed;
      b.wobble += 0.03;

      const bx = b.x + Math.sin(b.wobble) * b.wobbleAmp;

      if (b.y + b.r < 0) continue;

      const g = bctx.createRadialGradient(
        bx - b.r * 0.3,
        b.y - b.r * 0.3,
        b.r * 0.1,
        bx,
        b.y,
        b.r
      );

      g.addColorStop(0, `rgba(220,235,255,${b.alpha * 0.6})`);
      g.addColorStop(0.5, `rgba(180,210,255,${b.alpha * 0.25})`);
      g.addColorStop(1, `rgba(140,185,240,${b.alpha * 0.08})`);

      bctx.beginPath();
      bctx.arc(bx, b.y, b.r, 0, Math.PI * 2);
      bctx.fillStyle = g;
      bctx.fill();

      bctx.beginPath();
      bctx.arc(bx, b.y, b.r, 0, Math.PI * 2);
      bctx.strokeStyle = `rgba(200,225,255,${b.alpha * 0.40})`;
      bctx.lineWidth = 0.7;
      bctx.stroke();

      bctx.beginPath();
      bctx.arc(
        bx - b.r * 0.28,
        b.y - b.r * 0.28,
        b.r * 0.22,
        0,
        Math.PI * 2
      );

      bctx.fillStyle = `rgba(255,255,255,${b.alpha * 0.45})`;
      bctx.fill();
    }

    if (el < 3400) {
      requestAnimationFrame(anim);
    } else {
      running = false;
    }
  }

  requestAnimationFrame(anim);

 // リロード泡
}function startReloadBubbles(bc) {
  const bctx = bc.getContext('2d');
  bc.width = window.innerWidth;
  bc.height = window.innerHeight;
  const BW = bc.width;
  const BH = bc.height;
  const bubbles = Array.from({ length: 120 }, (_, i) => {
    const b = {
      x: Math.random() * BW,
      y: - Math.random() * 80 - 20,
      r: Math.random() * 14 + 2,
      speed: Math.random() * 6 + 2.5,
      alpha: Math.random() * 0.35 + 0.12,
      wobble: Math.random() * Math.PI * 2,
      wobbleAmp: Math.random() * 8 + 1,
      delay: i * 20,
      born: false,
      startTime: null,
    };

    // たまに巨大泡
    if (Math.random() < 0.08) {
      b.r *= 2.4;
      b.speed *= 0.7;
      b.alpha *= 1.4;
    }

    return b;
  });

  let st = null;
  let running = true;

  function anim(ts) {

    if (!running) return;

    if (!st) st = ts;

    const el = ts - st;

    bctx.clearRect(0, 0, BW, BH);

    for (const b of bubbles) {

      if (!b.born && el < b.delay) continue;

      if (!b.born) {
        b.born = true;
        b.startTime = ts;
      }

      b.y += b.speed;
      b.wobble += 0.03;

      const bx = b.x + Math.sin(b.wobble) * b.wobbleAmp;

      if (b.y + b.r < BH) continue;

      const g = bctx.createRadialGradient(
        bx - b.r * 0.3,
        b.y - b.r * 0.3,
        b.r * 0.1,
        bx,
        b.y,
        b.r
      );

      g.addColorStop(0, `rgba(220,235,255,${b.alpha * 0.6})`);
      g.addColorStop(0.5, `rgba(180,210,255,${b.alpha * 0.25})`);
      g.addColorStop(1, `rgba(140,185,240,${b.alpha * 0.08})`);

      bctx.beginPath();
      bctx.arc(bx, b.y, b.r, 0, Math.PI * 2);
      bctx.fillStyle = g;
      bctx.fill();

      bctx.beginPath();
      bctx.arc(bx, b.y, b.r, 0, Math.PI * 2);
      bctx.strokeStyle = `rgba(200,225,255,${b.alpha * 0.40})`;
      bctx.lineWidth = 0.7;
      bctx.stroke();

      bctx.beginPath();
      bctx.arc(
        bx - b.r * 0.28,
        b.y - b.r * 0.28,
        b.r * 0.22,
        0,
        Math.PI * 2
      );

      bctx.fillStyle = `rgba(255,255,255,${b.alpha * 0.45})`;
      bctx.fill();
    }

    if (el < 3400) {
      requestAnimationFrame(anim);
    } else {
      running = false;
    }
  }

  requestAnimationFrame(anim);
}
 if (sessionStorage.getItem('fromDiary') === 'true') {
  sessionStorage.removeItem('fromDiary');
  const bc = document.getElementById('bubble-canvas');
  bc.classList.add('active');
  startReloadBubbles(bc);
}
function checkPassword() {
  const val = document.getElementById('pw-input').value.trim();
  const err = document.getElementById('pw-error');

  if (val === WRITE_PASSWORD) {
    sessionStorage.setItem('mode', 'owner');
    startTransition();
  }
  else if (val === READ_PASSWORD) {
    sessionStorage.setItem('mode', 'reader');
    startTransition();
  }
  else {
    err.textContent = 'the key does not fit.';
    document.getElementById('pw-input').value = '';
    setTimeout(() => { err.textContent = ''; }, 2500);
  }
}

function startTransition() {

  const overlay = document.getElementById('loading-overlay');
  const bc = document.getElementById('bubble-canvas');
  const flash = document.getElementById('white-flash');

  overlay.classList.add('active');
  sessionStorage.setItem('reload_bubbles', 'true');

  // 月を薄く
  document.getElementById('moon').style.opacity = '0.15';

  setTimeout(() => {
    bc.classList.add('active');
    startBubbles(bc);
  }, 300);

  // 白い浮上光
  setTimeout(() => {
    flash.classList.add('active');
  }, 1200);

  setTimeout(() => {
    window.location.href = 'diary.html';
  }, 3400);
}
 
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    checkPassword();
  }
});
 document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    e.target.blur();
    checkPassword();
  }
});
</script>
</body>
</html>
