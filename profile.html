<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Record</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:#d4b06a;
  font-family:'Cormorant Garamond', serif;
  overflow-x:hidden;

  transition:
    background-color 1.2s ease,
    color 1.2s ease;
}

/* --------------------------
   GATE
-------------------------- */

#gate{
  position:fixed;
  flex-direction:column;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.gate-text{
  font-size:12px;
  letter-spacing:3px;
  color:#d4b06a;
  width:100%;
  cursor:pointer;
  text-align:center;

  text-shadow:
  0 0 8px rgba(212,176,106,.7),
  0 0 20px rgba(212,176,106,.4);

  animation: glow 3s infinite ease-in-out;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  transition:opacity .8s ease;
}

@keyframes glow{
  0%,100%{
    opacity:.6;
  }
  50%{
    opacity:1;
  }
}

.fade-out{
  opacity:0;
  transition:.8s;
  pointer-events:none;
}

/* --------------------------
   PROFILE
-------------------------- */

#profile{
  opacity:0;
  transition:.8s;
  min-height:100vh;
}

#profile.show{
  opacity:1;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px;
}

.header a{
  color:#d4b06a;
  text-decoration:none;
  letter-spacing:2px;
  font-size:15px;
}

.lock{
  font-size:1.2rem;
}

/* --------------------------
   CARD
-------------------------- */

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.character-switch{
  display:flex;
  justify-content:center;
  gap:25px;
  margin-bottom:40px;
}

.switch-btn{
  background:none;
  font-family:'Cormorant Garamond', serif;
  border:none;
  color:#6e5a33;
  font-size:1.2rem;
  letter-spacing:2px;
  cursor:pointer;
  transition:.3s;
}

.switch-btn.active{
  color:#d4b06a;
}

.profile-card{
  border:1px solid rgba(212,176,106,.25);
  padding:35px;
  margin-bottom:40px;
  background:rgba(255,255,255,.01);
}

.name{
  font-size:18px;
  color:#f5f5f5;
  margin-bottom:0px;
  text-shadow:
    0 0 5px rgba(0,0,0,1),
    0 0 10px rgba(0,0,0,1),
    0 0 15px rgba(0,0,0,.9);

}

.subtitle{
  opacity:.7;
  color:#f5f5f5;
  font-size:0.8rem;
  margin-bottom:7px;
  text-shadow:
    0 0 5px rgba(0,0,0,1),
    0 0 10px rgba(0,0,0,1),
    0 0 15px rgba(0,0,0,.9);
}

.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.info-item{
  border-bottom:1px solid rgba(212,176,106,.15);
  padding-bottom:8px;
}

body.real-mode .info-item{
  border-bottom:1px solid rgba(31,42,53,.15);
}
  
.label{
  font-size:.8rem;
  opacity:.55;
  letter-spacing:2px;
}

.value{
  margin-top:5px;
  font-size:1.1rem;
}

/* --------------------------
   RECORD BUTTONS
-------------------------- */

.accordion-list{
  display:flex;
  flex-direction:column;
  gap:0;
}

.accordion-item{
  border-bottom:1px solid rgba(212,176,106,.15);
}

.accordion-trigger{
  width:100%;
  background:none;
  border:none;
  color:#d4b06a;
  font-family:inherit;
  font-size:1rem;
  letter-spacing:2px;
  padding:18px 5px;
  cursor:pointer;
  text-align:left;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.accordion-trigger::after{
  content:'＋';
  font-size:.9rem;
  opacity:.5;
  transition:opacity .3s;
}

.accordion-trigger.open::after{
  content:'－';
}

.accordion-body{
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:max-height .4s ease, opacity .4s ease;
}

.accordion-body.open{
  max-height:600px;
  opacity:1;
}

.accordion-body-inner{
  padding:5px 5px 20px;
  line-height:2;
  white-space:pre-wrap;
  font-size:.95rem;
}

/* --------------------------
   MODAL
-------------------------- */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.modal.open{
  display:flex;
}

.modal-content{
  width:min(90%,800px);
  max-height:80vh;
  overflow-y:auto;

  border:1px solid rgba(212,176,106,.25);

  padding:35px;
  background:#080808;

  animation: fadeUp .4s ease;
}

body.real-mode .modal-content{
  background:#e6e6e6;
  border:1px solid rgba(31,42,53,.25);
}
  
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.modal-title{
  font-size:1.8rem;
  margin-bottom:20px;
}

.modal-body{
  line-height:2;
  white-space:pre-wrap;
}

.close{
  margin-top:25px;
  cursor:pointer;
  opacity:.7;
}

/* --------------------------
   CHARACTER FADE
-------------------------- */

.character-content{
  transition:.4s;
}

.character-content.fade{
  opacity:0;
}

/* --------------------------
   MOBILE
-------------------------- */

@media(max-width:700px){

.info-grid{
  grid-template-columns:1fr;
}

.name{
  font-size:18px;
}

.world-switch{
  text-align:center;
  margin-bottom:35px;
  letter-spacing:3px;
}

.world{
  cursor:pointer;
  opacity:.35;
  transition:.4s;
}

.world.active{
  opacity:1;
}

.divider{
  margin:0 12px;
  opacity:.25;
}

body.real-mode{
  background:#cfcfcf;
  color:#1f2a35;
}

body.real-mode .profile-card,
body.real-mode .record-btn,
body.real-mode .modal-content{
  border-color:rgba(31,42,53,.25);
}

body.real-mode .record-btn{
  color:#1f2a35;
}

body.real-mode .record-btn:hover{
  background:rgba(31,42,53,.08);
}

body.real-mode .label{
  color:#46515d;
}

body.real-mode .header a,
body.real-mode .lock,
body.real-mode .world,
body.real-mode .switch-btn{
  color:#1f2a35;
}

.character-content{
  opacity:1;
  transition:opacity .8s ease;
}

.character-content.fade{
  opacity:0;
}

body.real-mode .accordion-item{
  border-bottom:1px solid rgba(31,42,53,.15);
}

body.real-mode .accordion-trigger{
  color:#1f2a35;
}
  
/* --------------------------
  イラスト
-------------------------- */
.profile-banner{
  width:100%;
  height:80px;
  overflow:hidden;
  margin-bottom:20px;
  position:relative;
}

.profile-banner img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  filter:brightness(.7);
}  

.banner-overlay{
  position:absolute;
  left:15px;
  top:80%;
  transform:translateY(-50%);
}

.gate-input{
  background:none;
  border:none;
  border-bottom:1px solid rgba(212,176,106,.4);
  color:#d4b06a;
  font-family:'Cormorant Garamond',serif;
  font-size:14px;
  letter-spacing:3px;
  text-align:center;
  width:180px;
  outline:none;
  opacity:0;
  transition:opacity .8s ease;
  padding:5px 0;
  display:block;
  margin-top:20px;
}

.gate-input.show{
  opacity:1;
}

}
</style>
</head>
<body>

<!-- GATE -->

<div id="gate">
  <div class="gate-text" id="gate-question" onclick="showPasswordInput()">
    Would you like to view it?
  </div>
  <input
    class="gate-input"
    id="gate-input"
    type="password"
    onkeydown="checkPassword(event)"
    autocomplete="off"
  >
</div>

<!-- PROFILE -->

<div id="profile">

<div class="header">
  <a href="index.html">⌂</a>
  <div class="lock"></div>
</div>

<div class="container">

<div class="world-switch">
  <span class="world active" onclick="changeWorld('twst',this)">
    TWST RECORD
  </span>

  <span class="divider">/</span>

  <span class="world" onclick="changeWorld('real',this)">
    REAL RECORD
  </span>
</div>
  
<div class="character-switch">
  <button class="switch-btn active" onclick="changeCharacter('azul',this)">AZUL</button>
  <button class="switch-btn" onclick="changeCharacter('kadena',this)">KADENA</button>
</div>

<div id="character-content" class="character-content">

<div class="profile-card">

<div class="profile-banner">

  <img id="banner-image" src="イラスト9814.png">

  <div class="banner-overlay">
    <div class="name" id="name">Azul Ashengrotto</div>
    <div class="subtitle" id="subtitle">Record File</div>
  </div>

</div>

<div class="info-grid">

<div class="info-item">
<div class="label">AGE</div>
<div class="value" id="age">22</div>
</div>

<div class="info-item">
<div class="label">OCCUPATION</div>
<div class="value" id="job">Cafe Owner / Investor</div>
</div>

<div class="info-item">
<div class="label">BIRTHDAY</div>
<div class="value" id="birthday">2.24</div>
</div>

<div class="info-item">
<div class="label">ORIGIN</div>
<div class="value" id="origin">Coral Sea</div>
</div>

</div>

</div>

<div class="accordion-list">

<div class="accordion-item">
<button class="accordion-trigger" onclick="toggleAccordion(this,'personality')">Personality</button>
<div class="accordion-body"><div class="accordion-body-inner">Loading...</div></div>
</div>

<div class="accordion-item">
<button class="accordion-trigger" onclick="toggleAccordion(this,'likes')">Likes</button>
<div class="accordion-body"><div class="accordion-body-inner">Loading...</div></div>
</div>

<div class="accordion-item">
<button class="accordion-trigger" onclick="toggleAccordion(this,'dislikes')">Dislikes</button>
<div class="accordion-body"><div class="accordion-body-inner">Loading...</div></div>
</div>

<div class="accordion-item">
<button class="accordion-trigger" onclick="toggleAccordion(this,'past')">Past</button>
<div class="accordion-body"><div class="accordion-body-inner">Loading...</div></div>
</div>

<div class="accordion-item">
<button class="accordion-trigger" onclick="toggleAccordion(this,'feelings')">Feelings</button>
<div class="accordion-body"><div class="accordion-body-inner">Loading...</div></div>
</div>

<div class="accordion-item">
<button class="accordion-trigger" onclick="toggleAccordion(this,'memories')">Memories</button>
<div class="accordion-body"><div class="accordion-body-inner">Loading...</div></div>
</div>

</div>

</div>

</div>

</div>

</div>

<script>

let currentWorld = 'twst';
function changeWorld(world,btn){

  currentWorld = world;

  document
    .querySelectorAll('.world')
    .forEach(w=>w.classList.remove('active'));

  btn.classList.add('active');

const content =
document.getElementById('character-content');

content.classList.add('fade');

  if(world === 'real'){
    document.body.classList.add('real-mode');
  }else{
    document.body.classList.remove('real-mode');
  }

setTimeout(()=>{

  const data =
  worldData[world][currentCharacter];

  document.getElementById('name').textContent =
  data.name;

  document.getElementById('age').textContent =
  data.age;

  document.getElementById('job').textContent =
  data.job;

  document.getElementById('birthday').textContent =
  data.birthday;

  document.getElementById('origin').textContent =
  data.origin;

  document.getElementById('banner-image').src =
  data.image;
  
  content.classList.remove('fade');

},1200);

}

  
const PASSWORD = 'pisces';

function showPasswordInput(){
  const question = document.getElementById('gate-question');
  const input = document.getElementById('gate-input');

  question.classList.add('fade-out');

  setTimeout(()=>{
    question.style.display='none';
    input.classList.add('show');
    input.focus();
  },800);
}

function checkPassword(e){
  if(e.key !== 'Enter') return;

  const input = document.getElementById('gate-input');

  if(input.value === PASSWORD){
    document.getElementById('gate').classList.add('fade-out');
    setTimeout(()=>{
      document.getElementById('gate').style.display='none';
      document.getElementById('profile').classList.add('show');
    },800);
  }else{
    input.value='';
    input.style.borderBottomColor='rgba(255,80,80,.6)';
    setTimeout(()=>{
      input.style.borderBottomColor='rgba(212,176,106,.4)';
    },600);
  }
}

const characters = {

azul:{
  name:'Azul Ashengrotto',
  age:'22',
  job:'Cafe Owner / Investor',
  birthday:'2.24',
  origin:'Coral Sea',

  personality:`ここにアズの性格`,
  likes:`ここに好きなもの`,
  dislikes:`ここに苦手なもの`,
  past:`ここに過去`,
  feelings:`ここに相手への気持ち`,
  memories:`ここに思い出`
},

kadena:{
  name:'Kadena',
  age:'24',
  job:'Merchant',
  birthday:'--',
  origin:'Jewel Country',

  personality:`ここにカデナの性格`,
  likes:`ここに好きなもの`,
  dislikes:`ここに苦手なもの`,
  past:`ここに過去`,
  feelings:`ここに相手への気持ち`,
  memories:`ここに思い出`
}

};
const worldData = {

  twst:{
    azul:{
      name:'Azul Ashengrotto',
      age:'22',
      job:'Cafe Owner / Investor',
      birthday:'2.24',
      origin:'Coral Sea',
      image:'イラスト9814.png'
    },
    kadena:{
      name:'Kadena',
      age:'24',
      job:'Merchant',
      birthday:'--',
      origin:'Jewel Country',
      image:'イラスト98 (14).png'
    }
  },

  real:{
    azul:{
      name:'Az',
      age:'22',
      job:'University Student',
      birthday:'2.24',
      origin:'Japan',
      image:'bd9fa45243d7863e41635592c73b8b19.jpg'
    },
    kadena:{
      name:'Kadena',
      age:'24',
      job:'Office Worker',
      birthday:'--',
      origin:'Japan',
      image:'fcbe0571958296889581c7b5cf794ab0.jpg'
    }
  }

};

let currentCharacter='azul';

function changeCharacter(id,btn){

  document.querySelectorAll('.switch-btn')
  .forEach(b=>b.classList.remove('active'));

  btn.classList.add('active');

  const content =
  document.getElementById('character-content');

  content.classList.add('fade');

  setTimeout(()=>{

  currentCharacter=id;

  const data =
  worldData[currentWorld][id];

  document.getElementById('name').textContent =
  data.name;

  document.getElementById('age').textContent =
  data.age;

  document.getElementById('job').textContent =
  data.job;

  document.getElementById('birthday').textContent =
  data.birthday;

  document.getElementById('origin').textContent =
  data.origin;

  document.getElementById('banner-image').src =
  data.image;

  content.classList.remove('fade');

},1200);

}

async function toggleAccordion(trigger, type){

  const body = trigger.nextElementSibling;
  const isOpen = body.classList.contains('open');

  // 全部閉じる
  document.querySelectorAll('.accordion-body').forEach(b=>{
    b.classList.remove('open');
  });
  document.querySelectorAll('.accordion-trigger').forEach(t=>{
    t.classList.remove('open');
  });

  if(isOpen) return;

  trigger.classList.add('open');
  body.classList.add('open');

  const inner = body.querySelector('.accordion-body-inner');
  inner.textContent = 'Loading...';

  const charId = currentCharacter === 'azul' ? 'az' : 'cd';
  const docId = `${currentWorld}_${charId}`;

  const snap = await getDoc(
    doc(window.db, 'profiles', docId)
  );

  if(snap.exists()){
    const data = snap.data();
    inner.textContent = data[type] || 'No data';
  }else{
    inner.textContent = 'Document not found';
  }

}

</script>

</script>

</body>
</html>
