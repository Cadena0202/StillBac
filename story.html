<script>  
const canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');  
let W,H;  
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}  
resize();window.addEventListener('resize',resize);  
const SNOW=Array.from({length:40},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.4+0.3,speed:Math.random()*0.00008+0.00003,alpha:Math.random()*0.24+0.05,wobble:Math.random()*Math.PI*2,ws:Math.random()*0.0007+0.0002}));  
function draw(t){  
  ctx.clearRect(0,0,W,H);
  // 深度ノイズ
  const noise = ctx.createRadialGradient(
    W * 0.5,
    H * 0.45,
    0,
    W * 0.5,
    H * 0.45,
    H * 0.9
  );

  noise.addColorStop(0, 'rgba(20,30,45,0)');
  noise.addColorStop(0.55, 'rgba(5,8,15,0.18)');
  noise.addColorStop(1, 'rgba(0,0,0,0.55)');

  ctx.fillStyle = noise;
  ctx.fillRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);  
  bg.addColorStop(0,'#0a1018');bg.addColorStop(0.5,'#05080f');bg.addColorStop(1,'#000000');  
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);  
  for(const p of SNOW){p.y-=p.speed;p.wobble+=p.ws;if(p.y<-0.02){p.y=1.02;p.x=Math.random();}  
    const px=(p.x+Math.sin(p.wobble)*0.013)*W,py=p.y*H;  
    ctx.beginPath();ctx.arc(px,py,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(170,190,220,${p.alpha*(0.55-p.y*0.35)})`;ctx.fill();}  
  requestAnimationFrame(draw);  
}  
requestAnimationFrame(draw);  
</script>

  try{

    const q=query(
      collection(db,'stories'),
      orderBy('createdAt','desc')
    );

    const [snap] = await Promise.all([

      getDocs(q),

      new Promise(resolve=>setTimeout(resolve,1800))

    ]);

    allStories=[];

    snap.forEach(d=>
      allStories.push({
        id:d.id,
        ...d.data()
      })
    );
const flash = document.getElementById('loading-flash');

if(flash){
  flash.classList.remove('active');

  void flash.offsetWidth;

  flash.classList.add('active');
  const wrap=document.querySelector('.story-wrap');

wrap.classList.add('flash');

setTimeout(()=>{
  wrap.classList.remove('flash');
},700);
}

    renderStories();

  }catch(e){

    list.innerHTML=
      '<div class="empty-note">— まだ何も書かれていない —</div>';

  }
}
  
function renderStories(){  
  const list=document.getElementById('story-list');  
  list.innerHTML='';  
  if(allStories.length===0){list.innerHTML='<div class="empty-note">— まだ何も書かれていない —</div>';return;}  
  allStories.forEach((s,i)=>{  
    const el=document.createElement('div');  
    el.className='story-item';  
    el.style.animationDelay=`${i*0.06}s`;  
    el.innerHTML=`<span class="story-num">${String(allStories.length-i).padStart(2,'0')}.</span><div class="story-info"><div class="story-title">${escHtml(s.title||'— 無題 —')}</div><div class="story-desc">${escHtml(s.desc||'')}</div></div><span class="story-arrow">→</span>`;  
    el.addEventListener('click',()=>openStory(s));  
    list.appendChild(el);  
  });  
}  
  
function openStory(s){  
  currentStoryId=s.id;  
  document.getElementById('story-modal-title').textContent=s.title||'— 無題 —';   
  document.getElementById('story-modal-body').textContent=s.body||'';  
  const del=document.getElementById('story-modal-delete');
  const edit=document.getElementById('story-modal-edit');
if(isOwner){
  del.classList.add('show');
  edit.classList.add('show');
}else{
  del.classList.remove('show');
  edit.classList.remove('show');
}
  
document.getElementById('story-modal').classList.add('open');
document.getElementById('deep-fade').classList.add('active');
}
  
async function deleteStory(){  
  if(!isOwner||!currentStoryId)return;  
  try{  
    await deleteDoc(doc(db,'stories',currentStoryId));  
    document.getElementById('story-modal').classList.remove('open');  
    allStories=allStories.filter(s=>s.id!==currentStoryId);  
    currentStoryId=null;renderStories();  
  }catch(e){alert('削除に失敗しました。');}  
}  
  
  function editStory(){
  if(!isOwner || !currentStoryId) return;
  const s = allStories.find(x => x.id === currentStoryId);
  if(!s) return;
  editingStoryId = s.id;
  document.getElementById('story-title-input').value = s.title || '';
  document.getElementById('story-desc-input').value = s.desc || '';
  document.getElementById('story-body-input').value = s.body || '';
  document.getElementById('story-modal').classList.remove('open');
  document.getElementById('post-modal').classList.add('open');
}
  
async function postStory(){
  if(!isOwner)return;

  const title=document.getElementById('story-title-input').value.trim();
  const desc=document.getElementById('story-desc-input').value.trim();
  const body=document.getElementById('story-body-input').value.trim();

  if(!body)return;

  const now=new Date();
  const date=now.toLocaleDateString('ja-JP',{
    year:'numeric',
    month:'2-digit',
    day:'2-digit'
  }).replace(/\//g,'-');

  try{

    if(editingStoryId){

      await updateDoc(doc(db,'stories',editingStoryId),{
        title:title||'— 無題 —',
        desc,
        body,
        date
      });

      const target = allStories.find(s=>s.id===editingStoryId);

      if(target){
        target.title = title||'— 無題 —';
        target.desc = desc;
        target.body = body;
        target.date = date;
      }

      editingStoryId = null;

    }else{

      const ref=await addDoc(collection(db,'stories'),{
        title:title||'— 無題 —',
        desc,
        body,
        date,
        createdAt:now.getTime()
      });

      allStories.unshift({
        id:ref.id,
        title:title||'— 無題 —',
        desc,
        body,
        date,
        createdAt:now.getTime()
      });
    }

    document.getElementById('story-title-input').value='';
    document.getElementById('story-desc-input').value='';
    document.getElementById('story-body-input').value='';

    document.getElementById('post-modal').classList.remove('open');

    renderStories();

  }catch(e){
    console.error(e);
    alert(e.message);
  }
}
  
// 右上鍵アイコン（オーナー昇格）  
document.getElementById('lock-icon-btn').addEventListener('click',()=>{  
  if(isOwner)return;  
  const pw=prompt('write password');  
  if(pw===WRITE_PW){isOwner=true;document.getElementById('new-moon-btn').classList.add('show');}  
});  
  
const pwInput=document.getElementById('pw-input');

pwInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    e.preventDefault();
    checkPassword();
  }
});

document.getElementById('story-modal-close').addEventListener('click',()=>{

  document.getElementById('story-modal').classList.remove('open');
  document.getElementById('deep-fade').classList.remove('active');

});
document.getElementById('story-modal-delete').addEventListener('click',deleteStory);  
document.getElementById('story-modal-edit').addEventListener('click',editStory); 
document.getElementById('new-moon-btn').addEventListener('click',()=>{if(isOwner)document.getElementById('post-modal').classList.add('open');});  
document.getElementById('post-close').addEventListener('click',()=>document.getElementById('post-modal').classList.remove('open'));  
document.getElementById('btn-cancel').addEventListener('click',()=>document.getElementById('post-modal').classList.remove('open'));  
document.getElementById('btn-post').addEventListener('click',postStory);  
document.getElementById('back-top-btn').addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));  

document.getElementById('story-modal').addEventListener('click',e=>{
  if(e.target===e.currentTarget){
    e.currentTarget.classList.remove('open');
    document.getElementById('deep-fade').classList.remove('active');
  }
});
document.getElementById('post-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});  
</script>
